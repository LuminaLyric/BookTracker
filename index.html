<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookTracker</title>
  </head>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: #e5e5e5;
      overflow-x: hidden;
    }
    #Head {
      margin: 0;
      text-align: center;
      font-size: clamp(1.6em, 6vw, 2.5em);
      background: linear-gradient(90deg, #ff7e5f, #feb47b);
      display: block;
      top: 0em;
      left: 0em;
      width: 100%;
      padding: 10px 0;
      font-family: "Arial", sans-serif;
      position:fixed;
      display:flex;
      justify-content:center;
    }
    #AddBookTracker {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      background-color: #ff7e5f;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2em;
      color: white;
      cursor: pointer;
      border: none;
    }

    .bookList-container {
      padding: 15px;
      width: 20%;
      min-width: 220px;
      max-width: 320px;
      background: black;
      color: white;
      border-radius: 15px;
      margin: 20px;
      display: inline-block;
      margin-top: 100px;
      vertical-align: top;
    }
    .bookList-container h2 {
      color: red;
      font-size: 1.5em;
    }

    .bookList-container button {
      background-color: #feb47b;
      color: black;
      border: none;
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
      font-size: 16px;
      border-radius: 5px;
    }

    #popup {
      background-color: #ff7e5f;
      padding-right: 20px;
      padding-left: 20px;
      padding-top: 20px;
      padding-bottom: 20px;
      color: black;
      font-size: 20px;
      width: 90%;
      max-width: 320px;
      border-radius: 10px;
      z-index: 2;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
    }

    #popup input {
      background: transparent;
      width: 100%;
      padding: 5px;
      margin-bottom: 10px;
      border: none;
      font-size: 20px;
      border-bottom: solid black 2px;
    }

    #popup select {
      background: transparent;
      border-bottom: solid black 2px;
      border-left: none;
      border-right: none;
      border-top: none;
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
    }

    #popup button {
      background-color: #feb47b;
      color: black;
      border: none;
      padding: 10px 20px;
      margin-right: 10px;
      cursor: pointer;
      font-size: 16px;
      border-radius: 5px;
    }

    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: black;
      opacity: 0.5;
      z-index: 1;
      display: none;
    }
  </style>

  <body>
    <h1 id="Head">BookTracker</h1>
    <button onclick="openPopup()" id="AddBookTracker">+</button>
    <div class="bookList-container">
      <h2>Rich Dad and Poor Dad</h2>
      <h4>Robert Kiyosaki</h4>
      <p>Lifestyle</p>
      <p>Completed</p>
      <button onclick="removeBook(this)">Remove</button>
    </div>

    <div id="overlay"></div>
    <div id="popup">
      <h2>Add Book</h2>
      <form>
        <label for="title">Title:</label><br />
        <input type="text" id="title" name="title" required /><br />
        <label for="author">Author:</label><br />
        <input type="text" id="author" name="author" required /><br />

        <label for="Genre">Genre:</label><br />
        <select id="Genre" name="genre">
          <option value="fiction">Fiction</option>
          <option value="non-fiction">Non-Fiction</option>
          <option value="Lifestyle">Lifestyle</option>
          <option value="fantasy">Fantasy</option>
          <option value="science-fiction">Science Fiction</option>
          <option value="biography">Biography</option></select
        ><br />

        <label for="status">Status:</label><br />
        <select id="status" name="status">
          <option value="reading">Reading</option>
          <option value="completed">Completed</option>
          <option value="plan-to-read">Plan to Read</option></select
        ><br /><br />
        <button type="button" onclick="addBook()">Add Book</button>
        <button type="button" onclick="closePopup()">Cancel</button>
      </form>
    </div>

    <script>
      function openPopup() {
        document.getElementById("popup").style.display = "block";
        document.getElementById("overlay").style.display = "block";
      }

      function closePopup() {
        document.getElementById("popup").style.display = "none";
        document.getElementById("overlay").style.display = "none";
      }

      function addBook() {
        var booktitle = document.getElementById("title").value;
        var bookauthor = document.getElementById("author").value;
        var bookgenre = document.getElementById("Genre").value;
        var bookstatus = document.getElementById("status").value;

        var div = document.createElement("div");
        div.className = "bookList-container";

        div.innerHTML = `
      <h2>${booktitle}</h2>
      <h4>${bookauthor}</h4>
      <p>${bookgenre}</p>
      <p>${bookstatus}</p>
      <button onclick="removeBook(this)">Remove</button>
    `;

        document.body.appendChild(div);

        closePopup();

        document.getElementById("title").value = "";
        document.getElementById("author").value = "";
        document.getElementById("Genre").selectedIndex = 0;
        document.getElementById("status").selectedIndex = 0;
      }

      function removeBook(button) {
        button.parentElement.remove();
      }
    </script>
  </body>
</html>
